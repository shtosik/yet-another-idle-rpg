<div class="damage-container">
  @for (dmg of floatingDamages(); track dmg.id) {
    <div
      class="damage-number"
      [class.critical]="dmg.isCriticalHit"
      [class.strong]="dmg.isStrong"
    >
      {{ dmg.damage }}@if (dmg.isStrong) {
        <span class="strong-label">{{ 'app:damage.strong' | i18next }}</span>
      }
    </div>
  }
</div>
